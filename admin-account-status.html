<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Account Status - TARecruitment system</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .main-layout {
      display: flex;
      min-height: calc(100vh - 60px);
    }

    .sidebar {
      width: 240px;
      background-color: var(--gray-100);
      padding: 20px 0;
      border-right: 1px solid var(--gray-200);
    }

    .sidebar-title {
      padding: 0 20px;
      font-size: 12px;
      font-weight: 600;
      color: var(--gray-500);
      margin-bottom: 12px;
      text-transform: uppercase;
    }

    .sidebar-menu {
      list-style: none;
    }

    .sidebar-menu-item {
      padding: 12px 20px;
      cursor: pointer;
      border-left: 3px solid transparent;
      transition: all 0.2s;
      font-size: 14px;
    }

    .sidebar-menu-item:hover {
      background-color: var(--gray-200);
      color: var(--primary-color);
    }

    .sidebar-menu-item.active {
      background-color: var(--primary-light);
      color: var(--primary-color);
      border-left-color: var(--primary-color);
      font-weight: 600;
    }

    .content {
      flex: 1;
      padding: 26px;
    }

    .toolbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }

    .toolbar-right {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
    }

    .toolbar-right .form-control {
      min-width: 180px;
      height: 36px;
      font-size: 13px;
    }

    .section-title {
      margin: 0 0 12px;
      font-size: 18px;
      font-weight: 700;
    }

    .sections-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      align-items: start;
    }

    .section-panel {
      border: 1px solid var(--gray-200);
      border-radius: 10px;
      background: #fff;
      padding: 14px;
    }

    .section-panel-title {
      margin: 0 0 12px;
      font-size: 18px;
      font-weight: 700;
    }

    .section-panel-ta {
      background: linear-gradient(180deg, #f8fafc 0%, #ffffff 70%);
    }

    .section-panel-mo {
      background: linear-gradient(180deg, #f6f7ff 0%, #ffffff 70%);
    }

    .approval-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
      max-height: calc(100vh - 260px);
      overflow: auto;
      padding-right: 2px;
    }

    .approval-item {
      border: 1px solid var(--gray-200);
      background: #fff;
      border-radius: 8px;
      padding: 12px;
    }

    .approval-item-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
      font-weight: 600;
    }

    .approval-meta {
      font-size: 12px;
      color: var(--gray-500);
      line-height: 1.6;
      margin-bottom: 10px;
      word-break: break-word;
    }

    .approval-actions {
      display: flex;
      gap: 8px;
      justify-content: flex-end;
    }

    .status-badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 12px;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.4px;
      margin-left: 6px;
    }

    .status-active {
      color: #065f46;
      background: #d1fae5;
    }

    .status-inactive {
      color: #991b1b;
      background: #fee2e2;
    }

    .approval-empty {
      padding: 18px;
      text-align: center;
      color: var(--gray-500);
      border: 1px dashed var(--gray-300);
      border-radius: 8px;
      background: var(--gray-100);
      font-size: 13px;
      width: 100%;
    }

    @media (max-width: 1080px) {
      .sections-grid {
        grid-template-columns: 1fr;
      }

      .approval-list {
        max-height: none;
      }
    }
  </style>
</head>
<body>
  <div class="topbar">
    <div class="topbar-logo">
      <div class="topbar-logo-icon">TA</div>
      <span>TARecruitment system</span>
    </div>
    <div class="topbar-nav">
      <a class="topbar-link" href="profile.html">Profile</a>
      <div class="topbar-avatar">👤</div>
      <a id="logoutBtn" class="topbar-logout" href="#">Logout</a>
    </div>
  </div>

  <div class="main-layout">
    <div class="sidebar">
      <div class="sidebar-title">ADMIN FUNCTION</div>
      <ul class="sidebar-menu">
        <li class="sidebar-menu-item">Admin Dashboard</li>
        <li class="sidebar-menu-item active">Account Status</li>
        <li class="sidebar-menu-item">Profile</li>
      </ul>
    </div>

    <div class="content">
      <div class="toolbar">
        <h2 style="margin:0;">TA/MO Account Status Management</h2>
        <div class="toolbar-right">
          <select id="managedStatusFilter" class="form-control" aria-label="Filter by account status">
            <option value="all">All Status</option>
            <option value="active">Active</option>
            <option value="inactive">Inactive</option>
          </select>
          <input type="text" id="managedKeyword" class="form-control" placeholder="Search account / name / email">
          <button class="btn btn-secondary" id="clearBtn">Clear</button>
          <button class="btn btn-secondary" id="refreshBtn">Refresh</button>
        </div>
      </div>

      <div class="sections-grid">
        <section class="section-panel section-panel-ta">
          <h3 class="section-panel-title" id="taTitle">TA Account Area</h3>
          <div id="taUserList" class="approval-list"></div>
        </section>

        <section class="section-panel section-panel-mo">
          <h3 class="section-panel-title" id="moTitle">MO Account Area</h3>
          <div id="moUserList" class="approval-list"></div>
        </section>
      </div>
    </div>
  </div>

  <script src="js/script.js"></script>
  <script src="js/api.js"></script>
  <script>
    let allManagedUsers = [];

    // 功能：转义 HTML 特殊字符，降低 XSS 风险。
    function escapeHtml(text) {
      return String(text || '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    // 功能：标准化状态值，避免大小写与空值影响判断。
    function normalizeStatus(value) {
      return String(value || '').trim().toLowerCase();
    }

    // 功能：标准化文本输入，便于比较与搜索。
    function normalizeText(value) {
      return String(value || '').trim().toLowerCase();
    }

    // 功能：处理 statusBadge 相关逻辑。
    function statusBadge(status) {
      const s = normalizeStatus(status);
      if (s === 'inactive') {
        return '<span class="status-badge status-inactive">inactive</span>';
      }
      return '<span class="status-badge status-active">active</span>';
    }

    // 功能：渲染界面内容。
    function renderManagedUsers(listId, users, roleLabel) {
      // 渲染单个分区（TA 或 MO）的账号卡片。
      const list = document.getElementById(listId);
      if (!list) return;

      if (!users.length) {
        list.innerHTML = `<div class="approval-empty">No ${escapeHtml(roleLabel)} accounts available.</div>`;
        return;
      }

      list.innerHTML = users.map((u) => {
        // 关键状态变量：决定按钮文案和下一个提交状态。
        const status = normalizeStatus(u.status);
        const nextStatus = status === 'active' ? 'inactive' : 'active';
        const actionLabel = status === 'active' ? 'De-active' : 'Re-active';
        const actionClass = status === 'active' ? 'btn-danger' : 'btn-success';
        return `
          <div class="approval-item" data-user-id="${escapeHtml(u.userId || '')}">
            <div class="approval-item-head">
              <span>${escapeHtml(u.userName || 'Unknown')}</span>
              <span>${escapeHtml(u.role || '')}${statusBadge(status)}</span>
            </div>
            <div class="approval-meta">
              Account: ${escapeHtml(u.userId || '')}<br>
              Email: ${escapeHtml(u.email || '')}<br>
              QM ID: ${escapeHtml(u.qmId || '')}
            </div>
            <div class="approval-actions">
              <button class="btn ${actionClass}" data-action="set-status" data-user-id="${escapeHtml(u.userId || '')}" data-status="${escapeHtml(nextStatus)}">${actionLabel}</button>
            </div>
          </div>
        `;
      }).join('');
    }

    // 功能：应用搜索与状态筛选后渲染 TA/MO 分区。
    function applyManagedFilters() {
      const taTitle = document.getElementById('taTitle');
      const moTitle = document.getElementById('moTitle');
      const statusFilter = normalizeStatus(document.getElementById('managedStatusFilter')?.value || 'all');
      const keyword = normalizeText(document.getElementById('managedKeyword')?.value || '');

      const filtered = allManagedUsers.filter((u) => {
        const statusMatched = statusFilter === 'all' || normalizeStatus(u.status) === statusFilter;
        if (!statusMatched) {
          return false;
        }

        if (!keyword) {
          return true;
        }

        const searchable = [u.userId, u.userName, u.email, u.qmId, u.role, u.status]
          .map((x) => normalizeText(x))
          .join(' ');
        return searchable.includes(keyword);
      });

      const taUsers = filtered.filter((u) => String(u.role || '').toUpperCase() === 'TA');
      const moUsers = filtered.filter((u) => String(u.role || '').toUpperCase() === 'MO');
      const taTotal = allManagedUsers.filter((u) => String(u.role || '').toUpperCase() === 'TA').length;
      const moTotal = allManagedUsers.filter((u) => String(u.role || '').toUpperCase() === 'MO').length;
      const hasFilter = !!keyword || statusFilter !== 'all';

      if (taTitle) taTitle.textContent = hasFilter ? `TA Account Area (${taUsers.length}/${taTotal})` : `TA Account Area (${taUsers.length})`;
      if (moTitle) moTitle.textContent = hasFilter ? `MO Account Area (${moUsers.length}/${moTotal})` : `MO Account Area (${moUsers.length})`;

      renderManagedUsers('taUserList', taUsers, 'TA');
      renderManagedUsers('moUserList', moUsers, 'MO');
    }

    // 功能：加载相关数据并更新页面。
    async function loadManagedUsers() {
      // 分区容器与标题元素：用于 TA/MO 分区加载与数量展示。
      const taList = document.getElementById('taUserList');
      const moList = document.getElementById('moUserList');
      if (taList) taList.innerHTML = '<div class="approval-empty">Loading TA accounts...</div>';
      if (moList) moList.innerHTML = '<div class="approval-empty">Loading MO accounts...</div>';

      try {
        const result = await API.getManagedUsers();
        const users = Array.isArray(result && result.users) ? result.users : [];
        allManagedUsers = users;
        applyManagedFilters();
      } catch (error) {
        const message = escapeHtml(error.message || 'Failed to load accounts');
        if (taList) taList.innerHTML = `<div class="approval-empty">${message}</div>`;
        if (moList) moList.innerHTML = `<div class="approval-empty">${message}</div>`;
      }
    }

    // 功能：处理 handleAccountStatusAction 相关逻辑。
    async function handleAccountStatusAction(userId, status) {
      // 提交启停后立即刷新两个分区，保持页面与后端状态一致。
      try {
        const result = await API.updateUserStatus(userId, status);
        if (!result || !result.success) {
          taSystem.showMessage((result && result.message) || 'Failed to update account status', 'danger');
          return;
        }

        const normalized = normalizeStatus(result.status || status);
        taSystem.showMessage(`${userId} is now ${normalized}`, 'success');
        await loadManagedUsers();
      } catch (error) {
        taSystem.showMessage(error.message || 'Failed to update account status', 'danger');
      }
    }

    document.addEventListener('DOMContentLoaded', async () => {
      const allowed = await taSystem.enforceSessionGuard(['Admin']);
      if (!allowed) {
        return;
      }

      await loadManagedUsers();
      document.getElementById('refreshBtn')?.addEventListener('click', loadManagedUsers);
      document.getElementById('managedStatusFilter')?.addEventListener('change', applyManagedFilters);
      document.getElementById('managedKeyword')?.addEventListener('input', applyManagedFilters);
      document.getElementById('clearBtn')?.addEventListener('click', () => {
        const statusEl = document.getElementById('managedStatusFilter');
        const keywordEl = document.getElementById('managedKeyword');
        if (statusEl) statusEl.value = 'all';
        if (keywordEl) keywordEl.value = '';
        applyManagedFilters();
      });

      ['taUserList', 'moUserList'].forEach((id) => {
        // 分区级事件委托：每个区域独立处理自己的状态按钮点击。
        document.getElementById(id)?.addEventListener('click', async (e) => {
          const btn = e.target.closest('button[data-action="set-status"][data-user-id][data-status]');
          if (!btn) return;
          const targetUserId = btn.getAttribute('data-user-id');
          const nextStatus = btn.getAttribute('data-status');
          if (!targetUserId || !nextStatus) return;
          await handleAccountStatusAction(targetUserId, nextStatus);
        });
      });
    });
  </script>
</body>
</html>
