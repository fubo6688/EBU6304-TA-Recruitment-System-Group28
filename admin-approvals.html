<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registration Approvals - TARecruitment system</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .main-layout {
      display: flex;
      min-height: calc(100vh - 60px);
    }

    .sidebar {
      width: 240px;
      background-color: var(--gray-100);
      padding: 20px 0;
      border-right: 1px solid var(--gray-200);
    }

    .sidebar-title {
      padding: 0 20px;
      font-size: 12px;
      font-weight: 600;
      color: var(--gray-500);
      margin-bottom: 12px;
      text-transform: uppercase;
    }

    .sidebar-menu {
      list-style: none;
    }

    .sidebar-menu-item {
      padding: 12px 20px;
      cursor: pointer;
      border-left: 3px solid transparent;
      transition: all 0.2s;
      font-size: 14px;
    }

    .sidebar-menu-item:hover {
      background-color: var(--gray-200);
      color: var(--primary-color);
    }

    .sidebar-menu-item.active {
      background-color: var(--primary-light);
      color: var(--primary-color);
      border-left-color: var(--primary-color);
      font-weight: 600;
    }

    .content {
      flex: 1;
      padding: 26px;
    }

    .toolbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }

    .approval-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
      max-width: 900px;
    }

    .approval-item {
      border: 1px solid var(--gray-200);
      background: #fff;
      border-radius: 8px;
      padding: 12px;
    }

    .approval-item-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
      font-weight: 600;
    }

    .approval-meta {
      font-size: 12px;
      color: var(--gray-500);
      line-height: 1.6;
      margin-bottom: 10px;
      word-break: break-word;
    }

    .approval-actions {
      display: flex;
      gap: 8px;
      justify-content: flex-end;
    }

    .approval-empty {
      padding: 18px;
      text-align: center;
      color: var(--gray-500);
      border: 1px dashed var(--gray-300);
      border-radius: 8px;
      background: var(--gray-100);
      font-size: 13px;
      max-width: 900px;
    }
  </style>
</head>
<body>
  <div class="topbar">
    <div class="topbar-logo">
      <div class="topbar-logo-icon">TA</div>
      <span>TARecruitment system</span>
    </div>
    <div class="topbar-nav">
      <a class="topbar-link" href="profile.html">Profile</a>
      <div class="topbar-avatar">👤</div>
      <a id="logoutBtn" class="topbar-logout" href="#">Logout</a>
    </div>
  </div>

  <div class="main-layout">
    <div class="sidebar">
      <div class="sidebar-title">ADMIN FUNCTION</div>
      <ul class="sidebar-menu">
        <li class="sidebar-menu-item">Admin Dashboard</li>
        <li class="sidebar-menu-item active">Registration Approvals</li>
        <li class="sidebar-menu-item">Profile</li>
      </ul>
    </div>

    <div class="content">
      <div class="toolbar">
        <h2 style="margin:0;">Registration Approvals</h2>
        <button class="btn btn-secondary" id="refreshBtn">Refresh</button>
      </div>

      <div id="approvalList" class="approval-list"></div>
    </div>
  </div>

  <script src="js/script.js"></script>
  <script src="js/api.js"></script>
  <script>
    function escapeHtml(text) {
      return String(text || '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    async function loadPendingRegistrations() {
      const list = document.getElementById('approvalList');
      if (!list) return;

      list.innerHTML = '<div class="approval-empty">Loading pending registrations...</div>';
      try {
        const result = await API.getPendingRegistrations();
        const users = Array.isArray(result && result.users) ? result.users : [];

        if (!users.length) {
          list.innerHTML = '<div class="approval-empty">No pending registrations.</div>';
          return;
        }

        list.innerHTML = users.map((u) => `
          <div class="approval-item" data-user-id="${escapeHtml(u.userId || '')}">
            <div class="approval-item-head">
              <span>${escapeHtml(u.userName || 'Unknown')}</span>
              <span>${escapeHtml(u.role || '')}</span>
            </div>
            <div class="approval-meta">
              Account: ${escapeHtml(u.userId || '')}<br>
              Email: ${escapeHtml(u.email || '')}<br>
              QM ID: ${escapeHtml(u.qmId || '')}
            </div>
            <div class="approval-actions">
              <button class="btn btn-success" data-action="approve" data-user-id="${escapeHtml(u.userId || '')}">Approve</button>
              <button class="btn btn-danger" data-action="reject" data-user-id="${escapeHtml(u.userId || '')}">Reject</button>
            </div>
          </div>
        `).join('');
      } catch (error) {
        list.innerHTML = `<div class="approval-empty">${escapeHtml(error.message || 'Failed to load pending registrations')}</div>`;
      }
    }

    async function handleApprovalAction(userId, decision) {
      try {
        const result = await API.approveRegistration(userId, decision);
        if (!result || !result.success) {
          taSystem.showMessage((result && result.message) || 'Approval operation failed', 'danger');
          return;
        }
        taSystem.showMessage(`Registration ${decision}d: ${userId}`, 'success');
        await loadPendingRegistrations();
      } catch (error) {
        taSystem.showMessage(error.message || 'Approval operation failed', 'danger');
      }
    }

    document.addEventListener('DOMContentLoaded', async () => {
      const allowed = await taSystem.enforceSessionGuard(['Admin']);
      if (!allowed) {
        return;
      }

      await loadPendingRegistrations();

      document.getElementById('refreshBtn')?.addEventListener('click', loadPendingRegistrations);
      document.getElementById('approvalList')?.addEventListener('click', async (e) => {
        const btn = e.target.closest('button[data-action][data-user-id]');
        if (!btn) return;
        const action = btn.getAttribute('data-action');
        const targetUserId = btn.getAttribute('data-user-id');
        if (!action || !targetUserId) return;
        await handleApprovalAction(targetUserId, action);
      });
    });
  </script>
</body>
</html>
